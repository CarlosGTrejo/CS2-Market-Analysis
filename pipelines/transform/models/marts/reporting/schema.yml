version: 2

models:
  - name: rpt_commodity_velocity_daily
    description: >
      Daily aggregated market velocity and volume metrics, grouped by whether
      the  underlying items are considered commodities. 
    columns:
      - name: is_commodity
        description: Boolean indicating if the grouped items are commodities.
        tests:
          - not_null
      - name: market_date
        description: The date of the market activity.
        tests:
          - not_null
      - name: total_trade_volume_usd
        description: Total trade volume in USD for the given date and commodity grouping.
      - name: total_active_supply
        description: Total number of active asks (supply) on the market.
      - name: total_units_sold
        description: Total number of units sold.
      - name: group_turnover_rate
        description: >
          The turnover rate for the grouping, calculated as total units sold
          divided  by the total active supply (ask count).
      - name: avg_bid_ask_spread_pct
        description: The average bid-ask spread percentage across the grouping.

  - name: rpt_item_metrics_latest
    description: >
      A snapshot of the most recent market metrics and attributes for each
      individual item. This table is filtered to show only the latest available
      market date per item_name.
    columns:
      - name: item_name
        description: The unique name or identifier of the item.
        tests:
          - not_null
          - unique
      - name: item_type
        description: The high-level category or type of the item.
      - name: bucket_group_name
        description: The specific sub-group or bucket the item belongs to.
      - name: ask_count
        description: The number of active asks for the item on its latest market date.
      - name: ask_price_usd
        description: The lowest available ask price in USD.
      - name: bid_price_usd
        description: The highest available bid price in USD.
      - name: daily_units_sold
        description: Number of units sold on the latest market date.
      - name: daily_trade_volume_usd
        description: Trade volume in USD on the latest market date.
      - name: bid_ask_spread_pct
        description: The percentage difference between the lowest ask and highest bid.
      - name: turnover_rate
        description: The item's individual turnover rate (units sold / ask count).
      - name: quick_sell_ratio
        description: Ratio indicating how quickly the item is selling relative to its
          supply/demand.
      - name: is_commodity
        description: Boolean indicating whether the item is treated as a commodity.
      - name: market_date
        description: The date these metrics were recorded (represents the latest traded
          date for the item).
        tests:
          - not_null

  - name: rpt_market_metrics_daily
    description: >
      Overall daily aggregated market metrics, providing a macro view of
      total  market volume, supply, and turnover velocity.
    columns:
      - name: market_date
        description: The date of the market activity.
        tests:
          - not_null
          - unique
      - name: total_trade_volume_usd
        description: Total trade volume across the entire market in USD.
      - name: total_active_supply
        description: Total number of active asks (supply) across the entire market.
      - name: total_units_sold
        description: Total number of units sold across the entire market.
      - name: market_turnover_rate
        description: >
          The market-wide turnover rate, calculated as total units sold
          divided  by the total active supply.
      - name: avg_bid_ask_spread_pct
        description: The average bid-ask spread percentage across all items in the market.
