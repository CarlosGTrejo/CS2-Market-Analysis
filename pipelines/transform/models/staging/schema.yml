version: 2

models:
  - name: stg_items
    description: >
      Staging model for daily marketplace item data. Standardizes column names
      and data types from the raw items_raw source. 

      **Grain:** One row per `item_name` per `snapshot_date`.

      **Transformation Logic:** Performs intra-day deduplication to resolve
      potential  API pagination overlaps during extraction. It guarantees
      determinism by selecting  the most recent record per day based on the
      ingestion batch (`_dlt_load_id`),  falling back to the highest active
      listing count (`ask_count`) as a tie-breaker  to protect against momentary
      API anomalies.
    columns:
      - name: item_name
        description: Name of the market item, including any special attributes or
          conditions (e.g., 'Factory New', 'StatTrak').
        data_type: STRING
      - name: class_id
        description: Identifier for the item class, used to link to the dim_item_class
          dimension table.
        data_type: INT64
      - name: bucket_group_id
        description: >
          String identifier for the market bucket group, used to link to the
          dim_item_bucket_group dimension table. This is a broader
          categorization than class_id (i.e. there are less bucket groups than
          classes).
        data_type: STRING
      - name: bucket_group_name
        description: >
          Name of the market bucket group, providing a human-readable label for
          the bucket_group_id. This is a broader categorization than class_id
          (i.e. there are less bucket groups than classes).
        data_type: STRING
      - name: item_type
        description: >
          Type of the item, including ordinal classification (e.g., 'Exotic
          Collectible', 'Covert Rifle', 'Base Grade Container', 'Superior
          Agent'). Seems to be even broader than market bucket group.
        data_type: STRING
      - name: name_color
        description: Hex color code of the item name, which can indicate rarity or
          special attributes (e.g., pink for 'Covert' items)
        data_type: STRING
      - name: is_tradable
        description: Boolean flag indicating whether the item is tradable on the market.
        data_type: BOOL
      - name: is_commodity
        description: >
          Boolean indicating if the item is a commodity, which means it has no
          distinct attributes, like a sticker capsule. Non-commodity items can
          have different variations (e.g., different wear levels, StatTrak
          versions) that affect their market value.
        data_type: BOOL
      - name: ask_count
        description: Number of active sell listings for the item on the market,
          indicating its current supply.
        data_type: INT64
      - name: ask_price_cents
        description: Lowest price item is selling for in cents, representing the current
          market price.
        data_type: INT64
      - name: ask_price_usd
        description: Lowest price item is selling for in USD, representing the current
          market price.
        data_type: NUMERIC
      - name: bid_price_usd
        description: >
          Bid price converted from its original text format (e.g. '$0.25') to a
          numeric value in USD, providing a standardized price for analysis.
          Represents the highest price a buyer is willing to pay for the item.
        data_type: NUMERIC
      - name: snapshot_date
        description: Date when the item data was recorded, used for time-based analysis
          of market trends.
        data_type: DATE
      - name: _dlt_id
        description: Unique identifier for the record, generated by dlt during data
          extraction, used for tracking and debugging purposes.
        data_type: STRING
      - name: _dlt_load_id
        description: Identifier for the data load batch, generated by dlt, used for
          tracking and debugging purposes.
        data_type: STRING

  - name: stg_item_price_history
    description: >
      Staging model for historical marketplace sales data. Standardizes column
      names  and data types from the raw item_price_history_raw source.

      **Grain:** One row per `item_name` per `priced_at` timestamp.

      **Transformation Logic:** Performs deduplication to guarantee
      determinism.  It keeps the most recently loaded record per item and
      timestamp partition  by sorting on `_dlt_load_id desc` to ensure the
      latest pipeline run takes precedence.
    columns:
      - name: item_name
        description: Name of the market item, including any special attributes or
          conditions (e.g., 'Factory New', 'StatTrak').
        data_type: STRING
      - name: priced_at
        description: Timestamp indicating when the price and sales volume was recorded.
        data_type: TIMESTAMP
      - name: median_sale_price_usd
        description: Median sale price of the item in USD at the given timestamp.
        data_type: NUMERIC
      - name: units_sold
        description: Number of units sold at the given timestamp.
        data_type: INT64
      - name: _dlt_id
        description: Unique identifier for the record, generated by dlt during data
          extraction, used for tracking and debugging purposes.
        data_type: STRING
      - name: _dlt_load_id
        description: Identifier for the data load batch, generated by dlt, used for
          tracking and debugging purposes.
        data_type: STRING
