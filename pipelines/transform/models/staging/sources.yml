version: 2

sources:
  - name: raw_market_data
    schema: "{{ target.schema }}"
    description: "Raw CS2 market data loaded via dlt, provisioned as BigQuery external tables by Pulumi."
    tables:
      - name: items_external
        description: "Raw CS2 market items extracted by dlt from Steam API, stored in GCS as parquet files."
        columns:
          - name: name
            data_type: STRING
            description: "Duplicate item name column."
          - name: hash_name
            data_type: STRING
            description: "Duplicate item name column."
          - name: sell_listings
            data_type: INTEGER
            description: "Number of active sell listings for the item on the market, indicating its current supply."
          - name: sell_price
            data_type: INTEGER
            description: "Lowest sell price for the item in cents, representing the current market price."
          - name: sell_price_text
            data_type: STRING
            description: "Lowest sell price for the item in text format."
          - name: app_icon
            data_type: STRING
            description: "Icon URL for the app."
          - name: app_name
            data_type: STRING
            description: "Name of the app (i.e., CS2)."
          - name: sale_price_text
            data_type: STRING
            description: "Sale price in text format (e.g. '$0.25') representing the highest price a buyer is willing to pay."
          - name: snapshot_date
            data_type: TIMESTAMP
            description: "Date when the item data was recorded, used for time-based analysis of market trends."
          - name: asset_description__appid
            data_type: INTEGER
            description: "App ID associated with the asset (730 for CS2)."
          - name: asset_description__classid
            data_type: STRING
            description: "Identifier for the item class, used to link to the dim_item_class dimension table."
          - name: asset_description__background_color
            data_type: STRING
            description: "Background color of the asset in the inventory."
          - name: asset_description__icon_url
            data_type: STRING
            description: "URL for the asset's icon."
          - name: asset_description__tradable
            data_type: INTEGER
            description: "Flag indicating whether the item is tradable on the market."
          - name: asset_description__name
            data_type: STRING
            description: "Duplicate item name column."
          - name: asset_description__name_color
            data_type: STRING
            description: "Hex color code of the item name, which can indicate rarity or special attributes (e.g., pink for 'Covert' items)"
          - name: asset_description__type
            data_type: STRING
            description: "Type of the item, including ordinal classification (e.g., 'Exotic Collectible', 'Covert Rifle', 'Base Grade Container', 'Superior Agent')."
          - name: asset_description__market_name
            data_type: STRING
            description: "Duplicate item name column."
          - name: asset_description__market_hash_name
            data_type: STRING
            description: "Name of the market item, including any special attributes or conditions (e.g., 'Factory New', 'StatTrak')."
          - name: asset_description__commodity
            data_type: INTEGER
            description: "Boolean as integer indicating if the item is a commodity, which means it has no distinct attributes, like a sticker capsule."
          - name: asset_description__market_bucket_group_name
            data_type: STRING
            description: "Name of the market bucket group, providing a human-readable label for the market_bucket_group_id."
          - name: asset_description__market_bucket_group_id
            data_type: STRING
            description: "String identifier for the market bucket group, used to link to the dim_item_bucket_group dimension table."
          - name: _dlt_load_id
            data_type: STRING
            description: "Identifier for the data load batch, generated by dlt, used for tracking and debugging purposes."
          - name: _dlt_id
            data_type: STRING
            description: "Unique identifier for the record, generated by dlt during data extraction, used for tracking and debugging purposes."

      - name: item_price_history_external
        description: "Raw CS2 market item price history extracted by dlt from Steam API, stored in GCS as parquet files."
        columns:
          - name: market_hash_name
            data_type: STRING
            description: "Name of the market item, including any special attributes or conditions (e.g., 'Factory New', 'StatTrak')."
          - name: date
            data_type: STRING
            description: "Timestamp of the price record, indicating when the price and sales volume was recorded."
          - name: price
            data_type: FLOAT
            description: "Price of the item in USD at the given timestamp."
          - name: volume
            data_type: INTEGER
            description: "Number of units sold at the given timestamp."
          - name: _dlt_load_id
            data_type: STRING
            description: "Identifier for the data load batch, generated by dlt, used for tracking and debugging purposes."
          - name: _dlt_id
            data_type: STRING
            description: "Unique identifier for the record, generated by dlt during data extraction, used for tracking and debugging purposes."
