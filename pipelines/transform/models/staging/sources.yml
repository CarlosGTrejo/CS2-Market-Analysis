version: 2

sources:
  - name: raw_market_data
    schema: "{{ target.schema }}"
    description: "Raw CS2 market data loaded via dlt, provisioned as BigQuery external tables by Pulumi."
    tables:
      - name: items_external
        description: "Raw CS2 market items extracted by dlt from Steam API, stored in GCS as parquet files."

      - name: item_price_history_external
        description: "Raw CS2 market item price history extracted by dlt from Steam API, stored in GCS as parquet files."
