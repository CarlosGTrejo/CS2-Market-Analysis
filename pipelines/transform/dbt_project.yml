name: "cs2_market_analysis"
version: "1.0.0"
config-version: 2

profile: "cs2_market_analysis"

model-paths: [ "models" ]
analysis-paths: [ "analyses" ]
test-paths: [ "tests" ]
seed-paths: [ "seeds" ]
macro-paths: [ "macros" ]
snapshot-paths: [ "snapshots" ]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  cs2_market_analysis:

    # ------------------------------------------------------------------
    # FOLDER-LEVEL DEFAULTS
    # Model-specific configs (clustering, partitioning, incremental 
    # strategies) are handled in the {{ config() }} blocks of the .sql files.
    # ------------------------------------------------------------------

    staging:
      +materialized: view

    intermediate:
      # Ephemeral to reduce BigQuery view overhead for simple staging aggregations
      +materialized: ephemeral

    marts:
      # We let the core fact and dimension models define their own 
      # incremental materializations in their SQL files.

      reporting:
        # Default reporting models to tables unless overridden in the SQL file
        +materialized: table

        # Apply the parquet export macro to everything in the reporting folder
        +post-hook:
          - "{{ export_parquet() }}"

flags:
  send_anonymous_usage_stats: false
